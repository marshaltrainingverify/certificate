<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Marshal Training Certificate Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Certificate Verification</h2>

    <input type="text" id="certInput" placeholder="Enter Certificate Number">
    <button onclick="verifyCert()">Verify</button>
</div>

<!-- Modal -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle"></h3>
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Course:</strong> <span id="course"></span></p>
        <p><strong>Start Date:</strong> <span id="start"></span></p>
        <p><strong>End Date:</strong> <span id="end"></span></p>
        <p><strong>Issue Date:</strong> <span id="issue"></span></p>
        <p><strong>Validity:</strong> <span id="validity"></span></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
