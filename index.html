<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enter Certificate Number</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
            box-sizing: border-box;
        }

        button:hover {
            background: #0056b3;
        }

        /* Modal */
        #resultModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px;
            margin: 80px auto;
            padding: 25px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .modal-content h2 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .close-btn {
            background: #dc3545;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }

        .close-btn:hover {
            background: #b52a36;
        }

        .detail {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .label {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Marshal Training Logo (Updated) -->
    <img class="logo" src="https://www.marshaltraining.com/wp-content/uploads/2026/05/1_Marshal_Logo_Transparent_BG.png" alt="Marshal Training Logo">

    <h2>Certificate Verification</h2>

    <input id="certInput" type="text" placeholder="Enter Certificate Number (MT-XXXX-XXXX-XX)">
    <button onclick="verifyCert()">Verify</button>
</div>

<!-- Modal -->
<div id="resultModal">
    <div class="modal-content">
        <h2 id="modalTitle">Certificate Details</h2>

        <div class="detail"><span class="label">Certificate No:</span> <span id="certno"></span></div>
        <div class="detail"><span class="label">Participant Name:</span> <span id="participant"></span></div>
        <div class="detail"><span class="label">Company:</span> <span id="company"></span></div>
        <div class="detail"><span class="label">Course Title:</span> <span id="course"></span></div>
        <div class="detail"><span class="label">Course Date:</span> <span id="coursedate"></span></div>
        <div class="detail"><span class="label">Expiry Date:</span> <span id="expiry"></span></div>

        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
